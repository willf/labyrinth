<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labyrinth Portal</title>
    <style>
      :root {
        --bg-0: #f7f5ef;
        --bg-1: #e8e1d2;
        --ink: #1f1f1c;
        --muted: #5c5a53;
        --accent-2: #264653;
        --card: #fffdf8;
        --line: #d9cfbb;
        --shadow: 0 14px 38px rgba(28, 29, 24, 0.14);
        --radius: 20px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 10% 10%,
            rgba(184, 92, 56, 0.18),
            transparent 38%
          ),
          radial-gradient(
            circle at 85% 82%,
            rgba(38, 70, 83, 0.14),
            transparent 34%
          ),
          linear-gradient(165deg, var(--bg-0), var(--bg-1));
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .wrap {
        width: min(1080px, 100%);
      }

      h1 {
        margin: 0 0 0.5rem;
        text-align: center;
        letter-spacing: 0.02em;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      .subtitle {
        margin: 0 auto 2rem;
        max-width: 56ch;
        text-align: center;
        color: var(--muted);
        line-height: 1.55;
      }

      .grid {
        display: grid;
        gap: 1.25rem;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
        display: grid;
        grid-template-rows: 190px 1fr;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
      }

      .card:hover,
      .card:focus-within {
        transform: translateY(-4px);
        box-shadow: 0 18px 44px rgba(28, 29, 24, 0.18);
      }

      .preview {
        margin: 0;
        border-bottom: 1px solid var(--line);
        background: #f4efe4;
        overflow: hidden;
      }

      .preview-link {
        display: block;
        height: 100%;
      }

      .preview-link:focus-visible {
        outline: 3px solid var(--accent-2);
        outline-offset: -3px;
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
        display: block;
      }

      .content {
        padding: 1.1rem 1.1rem 1.2rem;
      }

      .title {
        margin: 0 0 0.45rem;
        font-size: 1.24rem;
      }

      .desc {
        margin: 0 0 1rem;
        color: var(--muted);
        line-height: 1.45;
      }

      .link {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        text-decoration: none;
        font-weight: 700;
        color: var(--accent-2);
        border-bottom: 2px solid transparent;
        transition: border-color 120ms ease;
      }

      .link:hover,
      .link:focus-visible {
        border-color: currentColor;
        outline: none;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Labyrinth Portal</h1>
      <p class="subtitle">Choose an experience below.</p>

      <section class="grid" aria-label="Labyrinth Pages">
        <article class="card">
          <figure class="preview">
            <a
              class="preview-link"
              href="labyrinth.html"
              aria-label="Go to labyrinth page"
            >
              <img src="labyrinth.png" alt="Preview of the labyrinth page" />
            </a>
          </figure>
          <div class="content">
            <h2 class="title">Labyrinth</h2>
            <p class="desc">
              Open the core labyrinth page and explore the maze interface.
            </p>
            <a class="link" href="labyrinth.html"
              >Go to labyrinth.html <span aria-hidden="true">→</span></a
            >
          </div>
        </article>

        <article class="card">
          <figure class="preview">
            <a
              class="preview-link"
              href="simulation.html"
              aria-label="Go to simulation page"
            >
              <img src="simulation.png" alt="Preview of the simulation page" />
            </a>
          </figure>
          <div class="content">
            <h2 class="title">Simulation</h2>
            <p class="desc">
              Launch the simulation view to watch maze behavior over time.
            </p>
            <a class="link" href="simulation.html"
              >Go to simulation.html <span aria-hidden="true">→</span></a
            >
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
